<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك أسئلة امتحان حقوق الإنسان الشامل - 100 سؤال</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #d69e2e;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --success-color: #38a169;
            --error-color: #e53e3e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .setup-card, .quiz-card, .result-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .progress-bar {
            background-color: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 15px;
            text-align: right;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        .option-btn:hover {
            background-color: #edf2f7;
            border-color: #cbd5e0;
        }

        .option-btn.selected {
            border-color: var(--secondary-color);
            background-color: #ebf8ff;
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #f0fff4;
            color: var(--success-color);
            font-weight: bold;
        }

        .option-btn.incorrect {
            border-color: var(--error-color);
            background-color: #fff5f5;
            color: var(--error-color);
        }

        .feedback-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .hint-box {
            background-color: #fefff0;
            border-right: 4px solid var(--accent-color);
        }

        .rationale-box {
            background-color: #f0f4f8;
            border-right: 4px solid var(--secondary-color);
        }

        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .score-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>بنك الأسئلة الشامل: مادة حقوق الإنسان</h1>
        <p>نظام امتحانات ذكي يحتوي على 100 سؤال حقيقي من مادتك الدراسية</p>
    </header>

    <div id="setup-screen" class="setup-card">
        <h2>إعداد الامتحان العشوائي</h2>
        <div class="form-group">
            <label for="question-count">عدد الأسئلة المطلوب في هذا الاختبار (البنك يحتوي على 100 سؤال جاهز):</label>
            <input type="number" id="question-count" min="5" max="100" value="20">
        </div>
        <button class="btn" onclick="startQuiz()">ابدأ الامتحان الآن</button>
    </div>

    <div id="quiz-screen" class="quiz-card hidden">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="question-counter">السؤال 1 من X</span>
            <span id="score-counter">النقاط: 0</span>
        </div>
        
        <div id="question-container" class="question-text"></div>
        <div id="options-container" class="options-container"></div>

        <button id="hint-btn" class="btn btn-accent" onclick="toggleHint()">إظهار تلميح ومساعدة</button>
        <div id="hint-box" class="feedback-box hint-box hidden"></div>
        <div id="rationale-box" class="feedback-box rationale-box hidden"></div>

        <div class="quiz-footer">
            <div></div>
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي</button>
        </div>
    </div>

    <div id="result-screen" class="result-card hidden">
        <h2>اكتمل الامتحان!</h2>
        <div id="final-score" class="score-display"></div>
        <p id="result-message" style="text-align: center; font-size: 18px;"></p>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" onclick="resetQuiz()">اختبار جديد بأسئلة عشوائية أخرى</button>
        </div>
    </div>
</div>

// المتغيرات البرمجية المسؤولة عن إدارة الامتحان وتدفق الأسئلة
let quizQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let isAnswered = false;

// دالة بدء الامتحان وإعداد عدد الأسئلة العشوائية المطلوبة
function startQuiz() {
    const countInput = document.getElementById('question-count');
    let count = parseInt(countInput.value);
    
    // التحقق من المدخلات لضمان عدم تجاوز حدود المصفوفة
    if (isNaN(count) || count < 5) count = 5;
    if (count > mainQuestionBank.length) count = mainQuestionBank.length;
    
    // خلط أسئلة بنك الأسئلة بالكامل عشوائياً واختيار العدد المحدد
    const shuffled = [...mainQuestionBank].sort(() => 0.5 - Math.random());
    quizQuestions = shuffled.slice(0, count);
    
    // إعادة تعيين الإحصائيات والشاشات
    currentQuestionIndex = 0;
    score = 0;
    
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    
    displayQuestion();
}

// دالة عرض السؤال الحالي والخيارات المرتبطة به
function displayQuestion() {
    isAnswered = false;
    document.getElementById('next-btn').classList.add('hidden');
    document.getElementById('hint-box').classList.add('hidden');
    document.getElementById('rationale-box').classList.add('hidden');
    document.getElementById('hint-btn').classList.remove('hidden');
    
    const currentQuestion = quizQuestions[currentQuestionIndex];
    
    // تحديث العدادات وشريط التقدم
    document.getElementById('question-counter').innerText = `السؤال ${currentQuestionIndex + 1} من ${quizQuestions.length}`;
    document.getElementById('score-counter').innerText = `النقاط: ${score}`;
    
    const progressPercent = ((currentQuestionIndex) / quizQuestions.length) * 100;
    document.getElementById('progress-fill').style.width = `${progressPercent}%`;
    
    // طباعة نص السؤال
    document.getElementById('question-container').innerText = currentQuestion.text;
    
    // توليد أزرار الخيارات ديناميكياً
    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    
    currentQuestion.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = 'option-btn';
        button.innerText = option;
        button.onclick = () => handleOptionClick(index, button);
        optionsContainer.appendChild(button);
    });
}

// دالة معالجة ضغط خيار الإجابة واحتساب النتيجة والتعليل
function handleOptionClick(selectedIndex, clickedButton) {
    if (isAnswered) return; // منع الضغط المتعدد بعد الإجابة
    isAnswered = true;
    
    const currentQuestion = quizQuestions[currentQuestionIndex];
    const optionButtons = document.querySelectorAll('.option-btn');
    
    if (selectedIndex === currentQuestion.correct) {
        clickedButton.classList.add('correct');
        score++;
    } else {
        clickedButton.classList.add('incorrect');
        // إظهار الإجابة الصحيحة باللون الأخضر للمساعدة في الدراسة
        optionButtons[currentQuestion.correct].classList.add('correct');
    }
    
    // تحديث عداد النقاط الفوري
    document.getElementById('score-counter').innerText = `النقاط: ${score}`;
    
    // عرض صندوق التعليل القانوني العلمي المعتمد
    const rationaleBox = document.getElementById('rationale-box');
    rationaleBox.innerHTML = `<strong>التعليل والتحليل الدستوري:</strong> ${currentQuestion.rationale}`;
    rationaleBox.classList.remove('hidden');
    
    // إخفاء زر التلميح وإظهار زر المتابعة
    document.getElementById('hint-btn').classList.add('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
}

// دالة إظهار أو إخفاء مساعدة التلميح المخصصة للسؤال
function toggleHint() {
    const hintBox = document.getElementById('hint-box');
    if (hintBox.classList.contains('hidden')) {
        const currentQuestion = quizQuestions[currentQuestionIndex];
        hintBox.innerHTML = `<strong>تلميح ومساعدة:</strong> ${currentQuestion.hint}`;
        hintBox.classList.remove('hidden');
    } else {
        hintBox.classList.add('hidden');
    }
}

// الانتقال للسؤال التالي أو إنهاء الاختبار وعرض لوحة النتائج
function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizQuestions.length) {
        displayQuestion();
    } else {
        showResults();
    }
}

// دالة حساب الدرجة النهائية وعرض رسالة التقييم الشاملة للطلاب
function showResults() {
    document.getElementById('quiz-screen').classList.add('hidden');
    const resultScreen = document.getElementById('result-screen');
    resultScreen.classList.remove('hidden');
    
    // ضبط شريط التقدم ليكون مكتملاً 100% عند النهاية
    document.getElementById('progress-fill').style.width = '100%';
    
    const percentage = Math.round((score / quizQuestions.length) * 100);
    document.getElementById('final-score').innerText = `نتيجتك هي: ${score} من أصل ${quizQuestions.length} (${percentage}%)`;
    
    let message = "";
    if (percentage >= 90) {
        message = "ممتاز جداً! أنت على دراية واحترافية كاملة بالحقوق والضمانات الدستورية الأردنية وجاهز للامتحان الشامل بامتياز. 🌟";
    } else if (percentage >= 75) {
        message = "أداء رائع ومتميز! استيعابك للمادة قوي جداً وقادر على إحراز علامة رفيعة بالفاينل. 👍";
    } else if (percentage >= 50) {
        message = "نتيجة جيدة، لقد نجحت في الاختبار! ننصحك بمراجعة التعليلات القانونية للأسئلة الخاطئة لتعزيز معلوماتك الدستورية. 📚";
    } else {
        message = "لم تحرز درجة النجاح المطلوبة. البنك غني بالتعليلات والشروحات الوفيرة؛ أعد المحاولة بأسئلة أخرى لترسيخ الضمانات الدستورية في ذهنك. 🎯";
    }
    
    document.getElementById('result-message').innerText = message;
}

// إعادة تدوير الاختبار للعودة لشاشة البدء والإعداد
function resetQuiz() {
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('setup-screen').classList.remove('hidden');
}
